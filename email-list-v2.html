<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>email list v2</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/fonts.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/utilities.css" />
    <link rel="stylesheet" href="./css/oocss-components.css" />
    <link rel="stylesheet" href="./css/email-page.css">
    <link rel="stylesheet" href="./css/yasaman.css">
</head>
<body>
    <div style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg">
            <use href="sprite.svg"></use> 
        </svg>
    </div>
    <main class="app-main u-grid">
        <section class="app-sidebar u-flex-column">
            <div class="sidebar__logo">
                <p>LOGO</p>
            </div>
            <hr>
            <div class="sidebar__nav">
                <ul class="sidebar__list">
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#dashboard"></use>
                        </svg> 
                        <span>Dashboard</span>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#notification"></use>
                        </svg>
                        <span>Notifications</span>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#note1"></use>
                        </svg>
                        <span>Notes</span>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#task"></use>
                        </svg>
                        <span>Tasks</span>
                    </li>
                    <li class="sidebar__item u-flex-between">
                        <div class="u-flex u-gap-3">
                            <svg>
                                <use href="sprite.svg#email"></use>
                            </svg>
                            <span>Emails</span>
                        </div>
                        <div>
                            <svg>
                                <use href="sprite.svg#arrow-up"></use>
                            </svg>
                        </div>
                    </li>
                    <li class="sidebar__item">
                        <ol class="sidebar__list">
                            <li class="sidebar__item">
                                <span>General</span>
                            </li>
                            <li class="sidebar__item">
                                <span>Analytics</span>
                            </li>
                        </ol>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#calendar"></use>
                        </svg>
                        <span>Calendars</span>
                    </li>
                </ul>
            </div>
            <hr>
            <div class="sidebar__database">
                    <ul class="sidebar__list">
                        <li class="sidebar__item">
                            <span>DATABASE</span>
                        </li>
                        <li class="sidebar__item">
                            <svg>
                                <use href="sprite.svg#analytics"></use>
                            </svg>
                            <span>Analytics</span>
                        </li>
                        <li class="sidebar__item">
                            <svg>
                                <use href="sprite.svg#contacts"></use>
                            </svg>
                            <span>Contacts</span>
                        </li>
                        <li class="sidebar__item">
                            <svg>
                                <use href="sprite.svg#companies"></use>
                            </svg>
                            <span>Companies</span>
                        </li>
                    </ul>
            </div>
            <hr>
            <div class="sidebar__Settings">
                <ul class="sidebar__list">
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#integrations"></use>
                        </svg>
                        <span>Integrations</span>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="sprite.svg#setting"></use>
                        </svg>
                        <span>Settings</span>
                    </li>
                </ul>
            </div>
            <hr>
            <div class="sidebar__footer u-flex-between u-flex">
                <span>M</span>
                <p>Marketing Teams</p>
                <div class="u-flex-column">
                    <svg>
                        <use href="sprite.svg#arrow-up"></use>
                    </svg>
                    <svg>
                        <use href="sprite.svg#arrow-down"></use>
                    </svg>
                </div>
            </div>
        </section>
        <section class="app-content">
        </section>
    </main>
</body>
</html>
